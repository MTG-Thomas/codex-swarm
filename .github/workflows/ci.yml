name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go-version:
          - "1.26.x"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          go build -trimpath ./cmd/cs
          go build -trimpath ./cmd/csd

      - name: macOS LaunchAgent service smoke
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export CODEX_SWARM_DAEMON_ADDR="127.0.0.1:18787"
          export CODEX_SWARM_STATE="$RUNNER_TEMP/codex-swarm-service-state.json"
          plist="$HOME/Library/LaunchAgents/codex-swarm-daemon.plist"
          cleanup() {
            ./csd uninstall || true
          }
          trap cleanup EXIT

          ./csd uninstall || true
          ./csd install

          test -f "$plist"
          grep -q "$CODEX_SWARM_DAEMON_ADDR" "$plist"
          grep -q "$CODEX_SWARM_STATE" "$plist"
          launchctl list | grep -q "codex-swarm-daemon"

          for i in {1..20}; do
            if CODEX_SWARM_DAEMON_URL="http://$CODEX_SWARM_DAEMON_ADDR" ./csd status; then
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "daemon did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          ./csd uninstall
          trap - EXIT
          test ! -f "$plist"

      - name: Linux systemd service smoke
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export CODEX_SWARM_DAEMON_ADDR="127.0.0.1:18788"
          export CODEX_SWARM_STATE="$RUNNER_TEMP/codex-swarm-service-state.json"
          unit="/etc/systemd/system/codex-swarm-daemon.service"
          cleanup() {
            sudo env CODEX_SWARM_DAEMON_ADDR="$CODEX_SWARM_DAEMON_ADDR" CODEX_SWARM_STATE="$CODEX_SWARM_STATE" ./csd uninstall || true
          }
          trap cleanup EXIT

          sudo env CODEX_SWARM_DAEMON_ADDR="$CODEX_SWARM_DAEMON_ADDR" CODEX_SWARM_STATE="$CODEX_SWARM_STATE" ./csd uninstall || true
          sudo env CODEX_SWARM_DAEMON_ADDR="$CODEX_SWARM_DAEMON_ADDR" CODEX_SWARM_STATE="$CODEX_SWARM_STATE" ./csd install

          test -f "$unit"
          grep -q "$CODEX_SWARM_DAEMON_ADDR" "$unit"
          grep -q "$CODEX_SWARM_STATE" "$unit"
          sudo systemctl start codex-swarm-daemon.service
          sudo systemctl is-active --quiet codex-swarm-daemon.service

          for i in {1..20}; do
            if CODEX_SWARM_DAEMON_URL="http://$CODEX_SWARM_DAEMON_ADDR" ./csd status; then
              break
            fi
            if [ "$i" -eq 20 ]; then
              sudo journalctl -u codex-swarm-daemon.service --no-pager -n 50 || true
              echo "daemon did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          sudo env CODEX_SWARM_DAEMON_ADDR="$CODEX_SWARM_DAEMON_ADDR" CODEX_SWARM_STATE="$CODEX_SWARM_STATE" ./csd uninstall
          trap - EXIT
          test ! -f "$unit"

      - name: Windows service smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CODEX_SWARM_DAEMON_ADDR = '127.0.0.1:18789'
          $env:CODEX_SWARM_STATE = Join-Path $env:RUNNER_TEMP 'codex-swarm-service-state.json'
          $serviceName = 'codex-swarm-daemon'
          try {
            .\csd.exe uninstall | Out-Host
          } catch {
          }
          try {
            .\csd.exe install
            $service = Get-Service -Name $serviceName
            if ($service.Status -ne 'Stopped') {
              throw "expected installed service to start stopped, got $($service.Status)"
            }
            Start-Service -Name $serviceName
            $service.WaitForStatus('Running', [TimeSpan]::FromSeconds(20))

            $env:CODEX_SWARM_DAEMON_URL = "http://$($env:CODEX_SWARM_DAEMON_ADDR)"
            for ($i = 1; $i -le 20; $i++) {
              try {
                .\csd.exe status
                break
              } catch {
                if ($i -eq 20) {
                  throw
                }
                Start-Sleep -Seconds 1
              }
            }
          } finally {
            try {
              Stop-Service -Name $serviceName -ErrorAction SilentlyContinue
            } catch {
            }
            try {
              .\csd.exe uninstall | Out-Host
            } catch {
            }
          }
          if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
            throw "service still exists after uninstall"
          }

      - name: Windows installer smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $makensis = ./scripts/bootstrap-nsis.ps1 -InstallDir (Join-Path $env:RUNNER_TEMP 'nsis')
          $outputDir = Join-Path $env:RUNNER_TEMP 'installer-output'
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          & $makensis `
            '/DAPP_VERSION=0.0.0-ci' `
            '/DAPP_VERSION_NUMERIC=0.0.0.0' `
            '/DAPP_ARCH=amd64' `
            "/DSOURCE_DIR=$env:GITHUB_WORKSPACE" `
            "/DOUTPUT_DIR=$outputDir" `
            '/DAPP_ID_SUFFIX=.ci' `
            installer/codex-swarm.nsi
          if ($LASTEXITCODE -ne 0) {
            throw "makensis failed with exit code $LASTEXITCODE"
          }
          ./scripts/test-windows-installer.ps1 `
            -InstallerPath (Join-Path $outputDir 'codex-swarm-v0.0.0-ci-windows-amd64-setup.exe')
