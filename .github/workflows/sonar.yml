name: sonar

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  # Minimal permissions: SonarCloud only needs source and pull request metadata.
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        if: env.SONAR_TOKEN != ''
        run: |
          mkdir -p .sonar
          go test -coverprofile=.sonar/coverage.out ./...

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1

      - name: SonarCloud not configured
        if: env.SONAR_TOKEN == ''
        run: |
          echo "Skipping SonarCloud scan because SONAR_TOKEN is not configured for this repository."
          echo "Create the SonarCloud project MTG-Thomas_codex-swarm in organization mtg-thomas and add SONAR_TOKEN as a GitHub Actions secret."
