name: sonar

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        if: env.SONAR_TOKEN != ''
        run: |
          mkdir -p .sonar
          go test -coverprofile=.sonar/coverage.out ./...

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7

      - name: SonarCloud not configured
        if: env.SONAR_TOKEN == ''
        run: |
          echo "Skipping SonarCloud scan because SONAR_TOKEN is not configured for this repository."
          echo "Create the SonarCloud project MTG-Thomas_codex-swarm in organization mtg-thomas and add SONAR_TOKEN as a GitHub Actions secret."
