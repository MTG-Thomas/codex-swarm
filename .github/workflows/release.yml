name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short=12 HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          ldflags="-s -w -X github.com/MTG-Thomas/codex-swarm/internal/version.Version=$version -X github.com/MTG-Thomas/codex-swarm/internal/version.Commit=$commit -X github.com/MTG-Thomas/codex-swarm/internal/version.Date=$date"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -ldflags "$ldflags" -o "dist/cs${ext}" ./cmd/cs
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -ldflags "$ldflags" -o "dist/csd${ext}" ./cmd/csd
          archive="codex-swarm-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -9 "../${archive}.zip" "cs${ext}" "csd${ext}")
          else
            tar -C dist -czf "${archive}.tar.gz" "cs${ext}" "csd${ext}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-swarm-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            codex-swarm-*.tar.gz
            codex-swarm-*.zip

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          notes="codex-swarm ${GITHUB_REF_NAME}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes "$notes"
          fi
