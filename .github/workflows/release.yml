name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          commit="$(git rev-parse --short=12 HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
            go run ./scripts/generate-windows-resources.go -version "$version"
          fi
          ldflags="-s -w -X github.com/MTG-Thomas/codex-swarm/internal/version.Version=$version -X github.com/MTG-Thomas/codex-swarm/internal/version.Commit=$commit -X github.com/MTG-Thomas/codex-swarm/internal/version.Date=$date"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -ldflags "$ldflags" -o "dist/cs${ext}" ./cmd/cs
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -trimpath -ldflags "$ldflags" -o "dist/csd${ext}" ./cmd/csd
          archive="codex-swarm-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -9 "../${archive}.zip" "cs${ext}" "csd${ext}")
          else
            tar -C dist -czf "${archive}.tar.gz" "cs${ext}" "csd${ext}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-swarm-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            codex-swarm-*.tar.gz
            codex-swarm-*.zip

  installer:
    name: windows installer
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download Windows artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: codex-swarm-${{ github.ref_name }}-windows-*
          path: artifacts

      - name: Bootstrap verified NSIS
        id: nsis
        shell: pwsh
        run: |
          $makensis = ./scripts/bootstrap-nsis.ps1 -InstallDir (Join-Path $env:RUNNER_TEMP 'nsis')
          "path=$makensis" >> $env:GITHUB_OUTPUT

      - name: Build installers
        shell: pwsh
        env:
          MAKENSIS_PATH: ${{ steps.nsis.outputs.path }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:RELEASE_REF_NAME.TrimStart('v')
          $numericVersionParts = @(($version -split '[-+]')[0] -split '\.')
          while ($numericVersionParts.Count -lt 4) {
            $numericVersionParts += '0'
          }
          $numericVersion = ($numericVersionParts | Select-Object -First 4) -join '.'
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          foreach ($arch in 'amd64', 'arm64') {
            $artifactDir = Join-Path 'artifacts' "codex-swarm-$($env:RELEASE_REF_NAME)-windows-$arch"
            $archive = Join-Path $artifactDir "codex-swarm-$($env:RELEASE_REF_NAME)-windows-$arch.zip"
            $sourceDir = Join-Path $env:RUNNER_TEMP "codex-swarm-$arch"
            Expand-Archive -LiteralPath $archive -DestinationPath $sourceDir
            & $env:MAKENSIS_PATH `
              "/DAPP_VERSION=$version" `
              "/DAPP_VERSION_NUMERIC=$numericVersion" `
              "/DAPP_ARCH=$arch" `
              "/DSOURCE_DIR=$sourceDir" `
              "/DOUTPUT_DIR=$((Resolve-Path dist).Path)" `
              installer/codex-swarm.nsi
            if ($LASTEXITCODE -ne 0) {
              throw "makensis failed for $arch with exit code $LASTEXITCODE"
            }
          }

      - name: Upload installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-swarm-${{ github.ref_name }}-windows-installers
          path: dist/*-setup.exe

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build
      - installer
    steps:
      - name: Checkout release notes
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file=".github/releases/${GITHUB_REF_NAME}.md"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          elif [ -f "$notes_file" ]; then
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi
