    notes: "Best broad Go source. Do not import wholesale; remove dependency bias toward samber libraries and framework-specific skills."
  - id: eduardo-sl-go-agent-skills
    name: eduardo-sl Go Agent Skills
    source: https://github.com/eduardo-sl/go-agent-skills
    license: MIT
